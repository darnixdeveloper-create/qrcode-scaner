<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Spark - Darnix Group</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QRCode Library CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-gradient-x {
            background-size: 200% 200%;
            animation: gradient-x 15s ease infinite;
        }
        @keyframes gradient-x {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #4f46e5;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('link');
            const [value, setValue] = useState('https://darnixgroup.com');
            const [size, setSize] = useState(256);
            const [fgColor, setFgColor] = useState('#000000');
            const [bgColor, setBgColor] = useState('#ffffff');
            const [isLoading, setIsLoading] = useState(false);
            const [isLibReady, setIsLibReady] = useState(false);
            const [bgImage, setBgImage] = useState('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe');
            const [showBgMenu, setShowBgMenu] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const [visits, setVisits] = useState(0);
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [isAdminAuth, setIsAdminAuth] = useState(false);
            const [adminPass, setAdminPass] = useState('');
            const [totalGenerated, setTotalGenerated] = useState(parseInt(localStorage.getItem('qr_total_gen') || '0'));
            const qrRef = useRef(null);

            const backgrounds = [
                { name: 'Default', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe' },
                { name: 'Nature', url: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b' },
                { name: 'Tech', url: 'https://images.unsplash.com/photo-1518770660439-4636190af475' },
                { name: 'Minimal', url: 'https://images.unsplash.com/photo-1557683316-973673baf926' }
            ];

            // Fetch visitor count
            useEffect(() => {
                const fetchVisits = async () => {
                    try {
                        const res = await fetch('https://api.counterapi.dev/v1/darnix-qr-spark/visits/up');
                        const data = await res.json();
                        setVisits(data.count || 1);
                    } catch (err) {
                        console.error('Counter API error:', err);
                        setVisits(Math.floor(Math.random() * 100) + 1); // Fallback
                    }
                };
                fetchVisits();
            }, []);

            // Increment generated count
            const incrementGenerated = () => {
                const newValue = totalGenerated + 1;
                setTotalGenerated(newValue);
                localStorage.setItem('qr_total_gen', newValue.toString());
            };

            // Update value when tab changes
            const handleTabChange = (tab) => {
                setActiveTab(tab);
                setUploadProgress(0);
                if (tab === 'link') setValue('https://darnixgroup.com');
                else if (tab === 'text') setValue('Karibu Darnix Group');
                else if (tab === 'image') setValue('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe');
            };

            // Check if library is ready
            useEffect(() => {
                const checkLib = () => {
                    if (window.QRCode || window.qrcode) {
                        setIsLibReady(true);
                    } else {
                        setTimeout(checkLib, 100);
                    }
                };
                checkLib();
            }, []);

            // Initialize Lucide icons after every render
            useEffect(() => {
                if (window.lucide) {
                    lucide.createIcons();
                }
            });

            // Handle QR generation
            useEffect(() => {
                if (!value || !isLibReady) return;
                setIsLoading(true);
                const timer = setTimeout(() => {
                    generateQR();
                    setIsLoading(false);
                    incrementGenerated();
                }, 500);
                return () => clearTimeout(timer);
            }, [value, size, fgColor, bgColor, isLibReady]);

            const generateQR = () => {
                const container = qrRef.current;
                if (!container) return;
                
                const qrLibrary = window.QRCode || window.qrcode;
                if (!qrLibrary) return;

                // Create canvas if it doesn't exist
                let canvas = container.querySelector('canvas');
                if (!canvas) {
                    canvas = document.createElement('canvas');
                    container.innerHTML = '';
                    container.appendChild(canvas);
                }
                
                qrLibrary.toCanvas(canvas, value, {
                    width: parseInt(size),
                    margin: 2,
                    color: {
                        dark: fgColor,
                        light: bgColor
                    }
                }, function (error) {
                    if (error) {
                        console.error('QRCode Error:', error);
                        return;
                    }
                    if (canvas) {
                        canvas.style.width = '100%';
                        canvas.style.height = 'auto';
                        canvas.style.borderRadius = '1.5rem';
                        canvas.style.display = 'block';
                    }
                });
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 50000) {
                        alert('Picha ni kubwa mno! Tafadhali chagua picha isiyozidi 50KB ili QR Code iweze kusomeka.');
                        return;
                    }
                    
                    setIsLoading(true);
                    setUploadProgress(0);
                    
                    const reader = new FileReader();
                    
                    reader.onprogress = (event) => {
                        if (event.lengthComputable) {
                            const progress = Math.round((event.loaded / event.total) * 100);
                            setUploadProgress(progress);
                        }
                    };

                    reader.onloadend = () => {
                        setValue(reader.result);
                        setUploadProgress(100);
                        setTimeout(() => {
                            setUploadProgress(0);
                            setIsLoading(false);
                        }, 500);
                    };

                    reader.onerror = () => {
                        alert('Imeshindikana kusoma picha. Jaribu tena.');
                        setIsLoading(false);
                        setUploadProgress(0);
                    };

                    reader.readAsDataURL(file);
                }
            };

            const downloadQR = () => {
                const canvas = qrRef.current.querySelector('canvas');
                if (canvas) {
                    const url = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `qrcode-darnix-${Date.now()}.png`;
                    link.href = url;
                    link.click();
                }
            };

            const handleAdminLogin = () => {
                if (adminPass === 'darnix2024') {
                    setIsAdminAuth(true);
                    setAdminPass('');
                } else {
                    alert('Nenosiri si sahihi!');
                }
            };

            return (
                <div className="min-h-screen relative overflow-x-hidden">
                    {/* Admin Dashboard Overlay */}
                    {isAdminOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={() => setIsAdminOpen(false)}></div>
                            <div className="relative w-full max-w-2xl glass-card shadow-2xl rounded-[2.5rem] overflow-hidden border border-white/20 animate-in zoom-in duration-300">
                                {!isAdminAuth ? (
                                    <div className="p-10 text-center space-y-8">
                                        <div className="w-20 h-20 bg-indigo-600 rounded-3xl mx-auto flex items-center justify-center shadow-2xl shadow-indigo-200">
                                            <i data-lucide="lock" className="text-white w-10 h-10"></i>
                                        </div>
                                        <div>
                                            <h2 className="text-3xl font-black tracking-tight text-slate-900">Ukurasa wa Admin</h2>
                                            <p className="text-slate-500 font-medium">Tafadhali weka nenosiri lako ili kuendelea</p>
                                        </div>
                                        <div className="space-y-4">
                                            <input 
                                                type="password" 
                                                value={adminPass}
                                                onChange={(e) => setAdminPass(e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && handleAdminLogin()}
                                                className="w-full h-14 border border-slate-200 bg-white/50 focus:ring-2 focus:ring-indigo-500 rounded-2xl text-center text-lg font-medium px-6 outline-none transition-all"
                                                placeholder="••••••••"
                                            />
                                            <button 
                                                onClick={handleAdminLogin}
                                                className="w-full h-14 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl shadow-xl font-black text-sm uppercase tracking-widest transition-all"
                                            >
                                                Ingia Sasa
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col h-full">
                                        <div className="p-8 bg-indigo-600 text-white flex justify-between items-center">
                                            <div>
                                                <h2 className="text-2xl font-black tracking-tight">Dashibodi ya Admin</h2>
                                                <p className="text-indigo-100 text-xs font-bold uppercase tracking-widest mt-1">Darnix Group Live Stats</p>
                                            </div>
                                            <button onClick={() => setIsAdminAuth(false)} className="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl text-xs font-black uppercase tracking-widest transition-all">
                                                Toka
                                            </button>
                                        </div>
                                        <div className="p-8 grid grid-cols-2 gap-6 bg-white/50">
                                            <div className="p-6 bg-white rounded-[2rem] shadow-sm border border-indigo-50">
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Jumla ya Wageni</span>
                                                <div className="text-4xl font-black text-indigo-600 mt-2">{visits.toLocaleString()}</div>
                                                <div className="flex items-center gap-1 text-[10px] text-green-500 font-bold mt-2">
                                                    <i data-lucide="trending-up" className="w-3 h-3"></i> +12% Leo
                                                </div>
                                            </div>
                                            <div className="p-6 bg-white rounded-[2rem] shadow-sm border border-indigo-50">
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">QR Zilizotengenezwa</span>
                                                <div className="text-4xl font-black text-blue-600 mt-2">{totalGenerated.toLocaleString()}</div>
                                                <div className="flex items-center gap-1 text-[10px] text-blue-400 font-bold mt-2">
                                                    <i data-lucide="zap" className="w-3 h-3"></i> Mfumo Unaendelea
                                                </div>
                                            </div>
                                            <div className="col-span-2 p-6 bg-indigo-50 rounded-[2rem] border border-indigo-100">
                                                <div className="flex items-center justify-between mb-4">
                                                    <h3 className="text-xs font-black uppercase tracking-widest text-indigo-700">Hali ya Mfumo</h3>
                                                    <span className="px-2 py-1 bg-green-500 text-white text-[8px] font-black rounded-md uppercase">Mubashara</span>
                                                </div>
                                                <div className="space-y-3">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[10px] font-bold text-slate-500">Kasi ya Server</span>
                                                        <span className="text-[10px] font-black text-indigo-600">42ms</span>
                                                    </div>
                                                    <div className="w-full h-1 bg-indigo-200 rounded-full overflow-hidden">
                                                        <div className="w-[90%] h-full bg-indigo-600"></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-10 bg-white border-t border-slate-100">
                                            <p className="text-[10px] text-slate-400 font-bold italic text-center">
                                                "Admin ana uwezo wa kufuatilia matumizi na kuhakikisha huduma bora kwa wateja wote wa QR Spark."
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Background Image with Overlay */}
                    <div 
                        className="fixed inset-0 -z-20 bg-cover bg-center bg-no-repeat scale-105 transition-all duration-1000"
                        style={{ backgroundImage: `url("${bgImage}")` }}
                    ></div>
                    <div className="fixed inset-0 -z-10 bg-white/70 backdrop-blur-[2px]"></div>

                    {/* Header */}
                    <header className="sticky top-0 z-50 w-full border-b border-white/20 bg-white/40 backdrop-blur-xl">
                        <div className="container mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="relative group">
                                    <div className="absolute -inset-1 bg-gradient-to-r from-indigo-600 to-blue-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                                    <div className="relative w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-xl border border-slate-100 overflow-hidden">
                                        <svg viewBox="0 0 100 100" className="w-8 h-8">
                                            <defs>
                                                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                                    <stop offset="0%" style={{stopColor:'#4f46e5', stopOpacity:1}} />
                                                    <stop offset="100%" style={{stopColor:'#2563eb', stopOpacity:1}} />
                                                </linearGradient>
                                            </defs>
                                            <rect x="15" y="15" width="30" height="30" rx="6" fill="url(#logoGrad)" />
                                            <rect x="55" y="15" width="30" height="30" rx="6" fill="url(#logoGrad)" />
                                            <rect x="15" y="55" width="30" height="30" rx="6" fill="url(#logoGrad)" />
                                            <path d="M55 55h10v10h-10z M75 55h10v10h-10z M55 75h10v10h-10z M75 75h10v10h-10z" fill="url(#logoGrad)" />
                                            <path d="M85 15l-12 12 M73 15l12 12" stroke="#fbbf24" strokeWidth="8" strokeLinecap="round" className="animate-pulse" />
                                        </svg>
                                    </div>
                                </div>
                                <div className="flex flex-col">
                                    <span className="text-2xl font-black tracking-tighter bg-gradient-to-r from-indigo-700 to-blue-700 bg-clip-text text-transparent leading-none">
                                        QR SPARK
                                    </span>
                                    <span className="text-[10px] font-bold text-indigo-500 tracking-[0.3em] uppercase">
                                        Darnix Group
                                    </span>
                                </div>
                            </div>
                            <nav className="hidden md:flex items-center gap-8">
                                <div className="relative">
                                    <button 
                                        onClick={() => setShowBgMenu(!showBgMenu)}
                                        className="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-600 hover:text-indigo-600 transition-colors"
                                    >
                                        <i data-lucide="image" className="w-4 h-4"></i> Mandhari
                                    </button>
                                    {showBgMenu && (
                                        <div className="absolute top-full mt-4 right-0 w-64 bg-white/90 backdrop-blur-xl border border-white/40 rounded-2xl shadow-2xl p-4 grid grid-cols-2 gap-2 z-[60] animate-in slide-in-from-top-2 duration-200">
                                            <div className="col-span-2 mb-2">
                                                <label className="flex items-center justify-center gap-2 h-16 w-full rounded-xl border-2 border-dashed border-indigo-200 bg-indigo-50/30 hover:bg-indigo-50 hover:border-indigo-400 cursor-pointer transition-all group">
                                                    <input 
                                                        type="file" 
                                                        accept="image/*" 
                                                        className="hidden" 
                                                        onChange={(e) => {
                                                            const file = e.target.files[0];
                                                            if (file) {
                                                                const reader = new FileReader();
                                                                reader.onloadend = () => {
                                                                    setBgImage(reader.result);
                                                                    setShowBgMenu(false);
                                                                };
                                                                reader.readAsDataURL(file);
                                                            }
                                                        }}
                                                    />
                                                    <div className="flex flex-col items-center">
                                                        <i data-lucide="plus-circle" className="w-5 h-5 text-indigo-600 group-hover:scale-110 transition-transform"></i>
                                                        <span className="text-[8px] font-black uppercase tracking-widest text-indigo-700 mt-1">Pakia</span>
                                                    </div>
                                                </label>
                                            </div>
                                            {backgrounds.map((bg) => (
                                                <button 
                                                    key={bg.name}
                                                    onClick={() => { setBgImage(bg.url); setShowBgMenu(false); }}
                                                    className="group relative h-16 rounded-xl overflow-hidden border-2 border-transparent hover:border-indigo-600 transition-all"
                                                >
                                                    <img src={bg.url} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                                                    <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-all"></div>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <a href="#" className="text-[10px] font-black uppercase tracking-widest text-slate-600 hover:text-indigo-600 transition-colors">Huduma</a>
                                <a href="#" className="text-[10px] font-black uppercase tracking-widest text-slate-600 hover:text-indigo-600 transition-colors">Msaada</a>
                            </nav>
                            <button className="rounded-full px-6 py-2 border border-white/40 bg-white/20 hover:bg-white/40 transition-all font-black text-[10px] uppercase tracking-widest">
                                Ingia
                            </button>
                        </div>
                    </header>

                    <main className="container mx-auto px-4 py-16 max-w-6xl relative">
                        <div className="text-center mb-20">
                            <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-100 text-indigo-700 text-[10px] font-black uppercase tracking-widest mb-6 border border-indigo-200 shadow-sm">
                                <i data-lucide="sparkles" className="w-3 h-3"></i> Toleo Jipya la 2024
                            </div>
                            <h1 className="text-5xl md:text-7xl font-black tracking-tighter mb-6 text-slate-900 leading-[0.9]">
                                Tengeneza QR Code <br />
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 via-blue-600 to-indigo-600 animate-gradient-x">
                                    Yenye Mvuto wa Kisasa
                                </span>
                            </h1>
                            <p className="text-lg text-slate-600 max-w-2xl mx-auto font-medium">
                                Badili link au maandishi kuwa QR Code ya kipekee kwa sekunde chache. 
                                Teknolojia ya kisasa kutoka <span className="text-indigo-600 font-bold">Darnix Group</span>.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-10 gap-10 items-start">
                            {/* Controls Section (60%) */}
                            <div className="lg:col-span-6 space-y-8">
                                <div className="glass-card shadow-2xl rounded-[2rem] overflow-hidden">
                                    <div className="bg-white/20 border-b border-white/20 p-8">
                                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                            <div>
                                                <h2 className="text-xl flex items-center gap-3 font-black tracking-tight">
                                                    <div className="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center">
                                                        <i data-lucide="settings-2" className="w-4 h-4 text-indigo-600"></i>
                                                    </div>
                                                    Sanidi QR Code
                                                </h2>
                                                <p className="text-slate-500 font-medium text-sm mt-1">Chagua aina ya data unayotaka</p>
                                            </div>
                                            <div className="flex p-1 bg-white/30 backdrop-blur-md rounded-xl border border-white/20">
                                                <button 
                                                    onClick={() => handleTabChange('link')}
                                                    className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'link' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-white/40'}`}
                                                >
                                                    Link
                                                </button>
                                                <button 
                                                    onClick={() => handleTabChange('text')}
                                                    className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'text' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-white/40'}`}
                                                >
                                                    Maandishi
                                                </button>
                                                <button 
                                                    onClick={() => handleTabChange('image')}
                                                    className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'image' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-white/40'}`}
                                                >
                                                    Picha
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-8 space-y-10">
                                        <div className="space-y-4">
                                            <label className="text-xs font-bold uppercase tracking-widest text-slate-500">
                                                {activeTab === 'link' ? 'Weka Link ya Tovuti' : activeTab === 'text' ? 'Weka Maandishi Yako' : 'Weka Link ya Picha (URL)'}
                                            </label>
                                            <div className="relative">
                                                <input 
                                                    type="text" 
                                                    value={value}
                                                    onChange={(e) => setValue(e.target.value)}
                                                    className="w-full h-14 border border-white/40 bg-white/50 focus:ring-2 focus:ring-indigo-500 rounded-2xl text-lg font-medium px-6 outline-none transition-all"
                                                    placeholder={activeTab === 'link' ? 'https://darnixgroup.com' : activeTab === 'text' ? 'Andika ujumbe hapa...' : 'https://mfano.com/picha.jpg'}
                                                />
                                                <div className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                                                    <i data-lucide={activeTab === 'link' ? 'link' : activeTab === 'text' ? 'type' : 'image'} className="w-5 h-5"></i>
                                                </div>
                                            </div>
                                            {activeTab === 'image' && (
                                                <div className="space-y-4">
                                                    <div className="flex flex-col gap-4">
                                                        <div className="relative">
                                                            <input 
                                                                type="text" 
                                                                value={value}
                                                                onChange={(e) => setValue(e.target.value)}
                                                                className="w-full h-14 border border-white/40 bg-white/50 focus:ring-2 focus:ring-indigo-500 rounded-2xl text-lg font-medium px-6 outline-none transition-all"
                                                                placeholder="https://mfano.com/picha.jpg"
                                                            />
                                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                                                                <i data-lucide="link" className="w-5 h-5"></i>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="flex items-center gap-4">
                                                            <div className="h-px flex-1 bg-slate-200"></div>
                                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">AU</span>
                                                            <div className="h-px flex-1 bg-slate-200"></div>
                                                        </div>

                                                        <label className="relative group cursor-pointer">
                                                            <input 
                                                                type="file" 
                                                                accept="image/*"
                                                                className="hidden"
                                                                onChange={handleFileUpload}
                                                            />
                                                            <div className="w-full h-14 border-2 border-dashed border-indigo-200 bg-indigo-50/30 hover:bg-indigo-50 hover:border-indigo-400 rounded-2xl flex items-center justify-center gap-3 transition-all relative overflow-hidden">
                                                                {uploadProgress > 0 && uploadProgress < 100 && (
                                                                    <div 
                                                                        className="absolute inset-0 bg-indigo-600/10 transition-all duration-300"
                                                                        style={{ width: `${uploadProgress}%` }}
                                                                    ></div>
                                                                )}
                                                                <i data-lucide={uploadProgress > 0 ? "loader-2" : "upload-cloud"} className={`w-5 h-5 text-indigo-600 ${uploadProgress > 0 ? 'animate-spin' : ''}`}></i>
                                                                <span className="text-sm font-bold text-indigo-700">
                                                                    {uploadProgress > 0 ? `Inapakia... ${uploadProgress}%` : 'Chagua Picha kutoka kwenye Kifaa'}
                                                                </span>
                                                            </div>
                                                        </label>
                                                    </div>

                                                    <div className="p-4 bg-blue-50/50 border border-blue-100 rounded-xl">
                                                        <p className="text-[10px] text-blue-700 font-bold leading-relaxed">
                                                            <i data-lucide="info" className="w-3 h-3 inline mr-1"></i>
                                                            Kumbuka: Picha unazopakia kutoka kwenye kifaa lazima ziwe ndogo sana (chini ya 50KB). Kwa picha kubwa, ni bora kutumia link ya picha iliyo mtandaoni.
                                                        </p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                            <div className="space-y-8">
                                                <div className="space-y-5">
                                                    <div className="flex justify-between items-center">
                                                        <label className="flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-slate-500">
                                                            <i data-lucide="maximize" className="w-4 h-4"></i> Ukubwa
                                                        </label>
                                                        <span className="text-xs font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">{size}px</span>
                                                    </div>
                                                    <input 
                                                        type="range" 
                                                        min="128" 
                                                        max="512" 
                                                        step="8" 
                                                        value={size} 
                                                        onChange={(e) => setSize(e.target.value)} 
                                                        className="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" 
                                                    />
                                                </div>
                                            </div>

                                            <div className="space-y-8">
                                                <div className="space-y-5">
                                                    <label className="flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-slate-500">
                                                        <i data-lucide="palette" className="w-4 h-4"></i> Rangi za QR
                                                    </label>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div className="space-y-3">
                                                            <span className="text-[10px] uppercase tracking-widest text-slate-400 font-black">Mbele</span>
                                                            <div className="flex items-center gap-3 p-2 border border-white/40 rounded-2xl bg-white/50 backdrop-blur-md">
                                                                <input 
                                                                    type="color" 
                                                                    value={fgColor} 
                                                                    onChange={(e) => setFgColor(e.target.value)}
                                                                    className="w-10 h-10 rounded-xl cursor-pointer border-none bg-transparent"
                                                                />
                                                                <span className="text-[10px] font-black uppercase font-mono">{fgColor}</span>
                                                            </div>
                                                        </div>
                                                        <div className="space-y-3">
                                                            <span className="text-[10px] uppercase tracking-widest text-slate-400 font-black">Nyuma</span>
                                                            <div className="flex items-center gap-3 p-2 border border-white/40 rounded-2xl bg-white/50 backdrop-blur-md">
                                                                <input 
                                                                    type="color" 
                                                                    value={bgColor} 
                                                                    onChange={(e) => setBgColor(e.target.value)}
                                                                    className="w-10 h-10 rounded-xl cursor-pointer border-none bg-transparent"
                                                                />
                                                                <span className="text-[10px] font-black uppercase font-mono">{bgColor}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-6 bg-white/20 border-t border-white/20 flex justify-end">
                                        <button onClick={() => { setValue('https://darnixgroup.com'); setSize(256); setFgColor('#000000'); setBgColor('#ffffff'); }} className="text-slate-500 hover:text-indigo-600 font-bold text-[10px] uppercase tracking-widest flex items-center gap-2">
                                            <i data-lucide="refresh-cw" className="w-4 h-4"></i> Rudisha Mwanzo
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Preview Section */}
                            <div className="lg:col-span-4 sticky top-24">
                                <div className="border-2 border-white/40 bg-white/60 backdrop-blur-3xl shadow-2xl rounded-[2.5rem] overflow-hidden">
                                    <div className="text-center pb-2 pt-8">
                                        <span className="text-[10px] font-black text-indigo-400 uppercase tracking-[0.3em]">Muonekano wa QR</span>
                                    </div>
                                    <div className="p-10 flex flex-col items-center gap-10">
                                        <div className="relative group">
                                            <div className={`p-8 rounded-[2rem] bg-white shadow-2xl border border-slate-100 relative overflow-hidden transition-all duration-500 ${isLoading ? 'opacity-50 scale-95' : 'opacity-100 scale-100'}`}>
                                                <div ref={qrRef}></div>
                                            </div>
                                            {isLoading && (
                                                <div className="absolute inset-0 flex flex-col items-center justify-center gap-4">
                                                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                                    <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest animate-pulse">Inatengenezwa...</span>
                                                </div>
                                            )}
                                            <div className="absolute -top-4 -right-4 w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl rotate-12 group-hover:rotate-0 transition-transform duration-500">
                                                <i data-lucide="sparkles" className="text-white w-6 h-6"></i>
                                            </div>
                                        </div>

                                        <button 
                                            onClick={downloadQR}
                                            disabled={isLoading}
                                            className="w-full h-16 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl shadow-xl font-black text-sm uppercase tracking-widest flex items-center justify-center gap-3 transition-all active:scale-95 disabled:opacity-50"
                                        >
                                            <i data-lucide="download" className="w-5 h-5"></i> Pakua QR Code (PNG)
                                        </button>

                                        <div className="w-full space-y-4">
                                            <div className="flex items-center gap-3">
                                                <div className="h-px flex-1 bg-slate-200"></div>
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sambaza Link</span>
                                                <div className="h-px flex-1 bg-slate-200"></div>
                                            </div>
                                            <div className="grid grid-cols-3 gap-3">
                                                <button 
                                                    onClick={() => window.open(`https://wa.me/?text=${encodeURIComponent('Angalia QR Code yangu kutoka QR Spark: ' + value)}`, '_blank')}
                                                    className="h-12 rounded-xl bg-[#25D366]/10 hover:bg-[#25D366]/20 text-[#25D366] border border-[#25D366]/20 flex items-center justify-center transition-all active:scale-95"
                                                    title="Share kwenye WhatsApp"
                                                >
                                                    <i data-lucide="message-circle" className="w-5 h-5"></i>
                                                </button>
                                                <button 
                                                    onClick={() => window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent('Nimetengeneza QR Code hii kwa kutumia QR Spark ya Darnix Group!')}&url=${encodeURIComponent(value)}`, '_blank')}
                                                    className="h-12 rounded-xl bg-black/5 hover:bg-black/10 text-black border border-black/10 flex items-center justify-center transition-all active:scale-95"
                                                    title="Share kwenye Twitter"
                                                >
                                                    <svg viewBox="0 0 24 24" className="w-4 h-4 fill-current"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                                </button>
                                                <button 
                                                    onClick={() => window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(value)}`, '_blank')}
                                                    className="h-12 rounded-xl bg-[#1877F2]/10 hover:bg-[#1877F2]/20 text-[#1877F2] border border-[#1877F2]/20 flex items-center justify-center transition-all active:scale-95"
                                                    title="Share kwenye Facebook"
                                                >
                                                    <i data-lucide="facebook" className="w-5 h-5"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-6 bg-indigo-600 border-t border-indigo-500">
                                        <p className="text-[10px] text-center text-white font-black uppercase tracking-[0.4em]">
                                            QR SPARK ENGINE v2.0 • DARNIX GROUP
                                        </p>
                                    </div>
                                </div>

                                <div className="mt-10 p-8 bg-white/40 backdrop-blur-xl rounded-[2rem] border border-white/40 shadow-sm">
                                    <h3 className="text-xs font-black mb-4 flex items-center gap-3 uppercase tracking-widest">
                                        <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-200"></div>
                                        Nukuu ya Darnix
                                    </h3>
                                    <p className="text-xs text-slate-600 leading-relaxed font-medium italic">
                                        "QR codes hizi ni za kudumu na hazina kikomo cha matumizi. Teknolojia yetu inahakikisha usalama na ubora wa hali ya juu kwa kila QR inayotengenezwa."
                                    </p>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="mt-32 border-t border-white/20 py-20 bg-white/40 backdrop-blur-2xl">
                        <div className="container mx-auto px-4 text-center">
                            <div className="flex flex-col items-center gap-4 mb-4">
                                <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-200">
                                    <i data-lucide="qr-code" className="text-white w-6 h-6"></i>
                                </div>
                                <div className="flex flex-col">
                                    <span className="text-2xl font-black tracking-tighter text-slate-900">QR SPARK</span>
                                    <div className="flex items-center justify-center gap-2">
                                        <span className="text-[10px] font-black text-indigo-500 tracking-[0.5em] uppercase">Darnix Group</span>
                                        <button onClick={() => setIsAdminOpen(true)} className="text-slate-300 hover:text-indigo-400 transition-colors" title="Admin Login">
                                            <i data-lucide="lock" className="w-3 h-3"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="mb-10 inline-flex items-center gap-6 px-6 py-3 bg-white/40 border border-white/40 rounded-full shadow-sm backdrop-blur-md">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-200"></div>
                                    <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Wageni Waliotembelea:</span>
                                    <span className="text-xs font-black text-indigo-600">{visits > 0 ? visits.toLocaleString() : 'Inachakata...'}</span>
                                </div>
                                <div className="w-px h-4 bg-slate-200"></div>
                                <div className="flex items-center gap-2">
                                    <i data-lucide="activity" className="w-3 h-3 text-blue-500"></i>
                                    <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Hali:</span>
                                    <span className="text-[10px] font-black text-blue-600 uppercase tracking-widest">Online</span>
                                </div>
                            </div>
                            
                            <p className="text-sm text-slate-500 mb-10 max-w-md mx-auto font-medium">
                                Imetengenezwa kwa upendo na <span className="text-indigo-600 font-black">Darnix Group</span>. 
                                Tunabadili ulimwengu kupitia teknolojia ya kisasa na ubunifu usio na kikomo.
                            </p>

                            <div className="pt-10 border-t border-slate-200/50">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                    &copy; 2024 DARNIX GROUP. HAKI ZOTE ZIMEHIFADHIWA.
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
